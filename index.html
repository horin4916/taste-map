<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취미바이브 - 나의 취미 지도</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="data.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .swiper { width: 320px; height: 480px; }
        .swiper-slide { background-position: center; background-size: cover; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
        .info-box { background: rgba(0, 0, 0, 0.75); padding: 20px; backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.1); }
        .info-box h3 { margin: 0 0 8px 0; font-size: 1.2rem; }
        .rating { color: #f1c40f; font-size: 0.9rem; margin-bottom: 8px; }
        .review { margin: 0 0 12px 0; font-size: 0.95rem; line-height: 1.5; color: #dcdde1; }
        .tags { color: #00a8ff; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🗺️ 나의 취미 지도</h2>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="card-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // data.js에서 선언된 hobbyData를 바로 사용합니다.
        const data = hobbyData; 
        const container = document.getElementById('card-container');
        
        data.forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.style.backgroundImage = `url('${item.coverImage}')`;

            let stars = '⭐'.repeat(Math.floor(item.rating));
            
            slide.innerHTML = `
                <div class="info-box">
                    <h3>${item.title} (${item.year})</h3>
                    <div class="rating">${stars}</div>
                    <p class="review">${item.myShortReview}</p>
                    <div class="tags">${Array.isArray(item.keywords) ? item.keywords.join(' ') : item.keywords}</div>
                </div>
            `;
            container.appendChild(slide);
        });

        new Swiper(".mySwiper", {
            effect: "cards",
            grabCursor: true,
        });
    </script>
</body>
</html>
