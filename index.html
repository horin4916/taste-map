<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>취미바이브 - 나의 취미 지도</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="data.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .swiper { width: 320px; height: 480px; }
        .swiper-slide { background-position: center; background-size: cover; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
        .info-box { background: rgba(0, 0, 0, 0.75); padding: 20px; backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.1); }
        .rating { color: #f1c40f; font-size: 1rem; margin-bottom: 8px; }
        .review { font-size: 0.95rem; color: #dcdde1; margin-bottom: 8px; }
        .tags { color: #00a8ff; font-size: 0.85rem; font-weight: bold; }
        /* 별점 컨테이너 */
        .star-rating {
            display: inline-block;
            font-size: 1.2rem;
            font-family: sans-serif;
            color: #ddd; /* 회색 바탕 (빈 별) */
            position: relative;
        }
        
        /* 꽉 찬 별을 표현하는 클래스 */
        .star-filled {
            color: #f1c40f; /* 노란색 */
        }
        
        /* 반쪽 별을 표현하는 핵심 CSS */
        .star-half {
            position: relative;
            color: #ddd; /* 빈 별을 기본으로 */
        }
        .star-half::after {
            content: '⭐'; /* 별 문자 */
            position: absolute;
            left: 0;
            top: 0;
            width: 50%; /* 딱 절반만 */
            overflow: hidden;
            color: #f1c40f; /* 색상은 노란색 */
        }
    </style>
</head>
<body>
    <h2>🗺️ 나의 취미 지도</h2>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="card-container"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const container = document.getElementById('card-container');
        hobbyData.forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.style.backgroundImage = `url('${item.coverImage}')`;
            
            // 별점 로직
            let fullStars = Math.floor(item.rating);
            let hasHalf = (item.rating % 1 !== 0);
            let starHTML = '<span class="star-rating">';
            
            // 1. 꽉 찬 별 추가
            starHTML += '<span class="star-filled">' + '⭐'.repeat(fullStars) + '</span>';
            
            // 2. 0.5점이 있으면 반쪽 별 추가
            if (hasHalf) {
                starHTML += '<span class="star-half">⭐</span>';
            }
            
            starHTML += '</span>';
            
            // 이후 slide.innerHTML 부분에 starHTML을 넣으면 됩니다.

            slide.innerHTML = `<div class="info-box">
                <h3>${item.title} (${item.year})</h3>
                <div class="rating">${starHTML}</div>
                <p class="review">${item.myShortReview}</p>
                <div class="tags">${item.keywords.join(' ')}</div>
            </div>`;
            container.appendChild(slide);
        });
        new Swiper(".mySwiper", { effect: "cards", grabCursor: true, mousewheel: true });
    </script>
</body>
</html>
